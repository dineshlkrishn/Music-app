<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music App</title>
    <style>
      :root { font-family: Arial, sans-serif; color-scheme: light dark; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #111827; color: #f3f4f6; }
      .card { width: min(680px, 92vw); background: #1f2937; border-radius: 12px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,.3); }
      h1 { margin-top: 0; }
      .status { padding: 12px; border-radius: 8px; margin: 12px 0; background: #374151; }
      .status.ok { background: #064e3b; }
      .status.error { background: #7f1d1d; }
      form { display: grid; gap: 10px; margin-top: 16px; }
      input, button { padding: 10px; border-radius: 8px; border: 1px solid #4b5563; font-size: 14px; }
      input { background: #111827; color: #f9fafb; }
      button { background: #2563eb; color: white; border: none; cursor: pointer; }
      button:hover { background: #1d4ed8; }
      pre { white-space: pre-wrap; word-break: break-word; background: #111827; padding: 12px; border-radius: 8px; }
      small { color: #9ca3af; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Music App</h1>
      <small>This page verifies live API communication between client and server.</small>

      <section>
        <h2>Backend status</h2>
        <div id="health" class="status">Checking API at <code>/api/test</code>...</div>
      </section>

      <section>
        <h2>Login API test</h2>
        <form id="login-form">
          <input type="email" id="email" value="admin@test.com" required />
          <input type="password" id="password" value="123456" required />
          <button type="submit">Call /api/auth/login</button>
        </form>
        <pre id="result">Submit the form to test API communication.</pre>
      </section>
    </main>

    <script>
      const health = document.getElementById("health");
      const result = document.getElementById("result");

      async function checkHealth() {
        try {
          const response = await fetch("/api/test");
          const text = await response.text();
          health.className = "status ok";
          health.textContent = `✅ ${text}`;
        } catch (error) {
          health.className = "status error";
          health.textContent = `❌ Unable to connect to API: ${error.message}`;
        }
      }

      document.getElementById("login-form").addEventListener("submit", async (event) => {
        event.preventDefault();

        const payload = {
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
        };

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Login request failed");
          }

          result.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          result.textContent = `Error: ${error.message}`;
        }
      });

      checkHealth();
    </script>
  </body>
</html>
